<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predikt</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
</head>
<body>

<div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

<!-- Layout: left-sidebar | main-content | right-sidebar — injected by app.js -->
<div class="layout" id="layout">
  <main class="main-content" id="main-content"></main>
</div>

<!-- Core libs -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<!-- App core (order matters) -->
<script src="/js/app.js"></script>
<script src="/js/router.js"></script>
<script src="/js/realtime.js"></script>
<script src="/js/charts.js"></script>

<!-- Page modules — each registers a route with router.register() -->
<script src="/js/pages/home.js"></script>
<script src="/js/pages/trades.js"></script>
<script src="/js/pages/markets.js"></script>
<script src="/js/pages/analytics.js"></script>
<script src="/js/pages/backtesting.js"></script>
<script src="/js/pages/settings.js"></script>
<script src="/js/pages/logs.js"></script>
<script src="/js/pages/wallet.js"></script>

<!-- Boot -->
<script>startApp();</script>
</body>
</html>
