<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predikt — Create Account</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body { overflow: auto; }

    .auth-error {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      line-height: 1.5;
      margin-bottom: 16px;
      animation: fadeSlideIn 0.2s ease;
    }
    .auth-error.error {
      background: rgba(255, 68, 68, 0.12);
      border: 1px solid rgba(255, 68, 68, 0.3);
      color: #ff8080;
    }
    .auth-error .err-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .auth-error .err-text { flex: 1; }

    .tg-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 0.78rem;
    }
    .tg-divider::before, .tg-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-primary);
    }

    .success-card {
      text-align: center;
      padding: 24px 0;
    }
    .success-card .success-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    .success-card .success-title {
      font-weight: 500;
      margin-bottom: 8px;
    }
    .success-card .success-desc {
      color: var(--text-muted);
      font-size: 0.84rem;
      line-height: 1.6;
    }
  </style>
</head>
<body class="login-body">

  <div class="login-box" style="animation:fadeSlideIn 0.4s ease;max-width:400px">
    <div class="text-center mb-4">
      <img src="/logo.svg" alt="Predikt" width="52" height="52" class="mb-3">
      <h4 class="fw-600 mb-1" style="letter-spacing:-0.5px">Create account</h4>
      <p class="text-muted small mb-0">Join Predikt — AI-powered prediction market signals</p>
    </div>

    <div id="signup-error" class="auth-error error d-none">
      <span class="err-icon">⚠️</span>
      <span class="err-text" id="signup-error-text"></span>
    </div>

    <div id="signup-success" class="d-none">
      <div class="success-card">
        <div class="success-icon">✉️</div>
        <div class="success-title">Check your email</div>
        <div class="success-desc">
          We sent a confirmation link to <strong id="confirm-email"></strong>.<br>
          Click it to activate your account.
        </div>
        <a href="/login" class="btn btn-outline-secondary btn-sm mt-3">Back to login</a>
      </div>
    </div>

    <form id="signup-form">
      <div class="mb-3">
        <label class="form-label">Display name</label>
        <input type="text" class="form-control" id="display-name" placeholder="Your name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-3" id="signup-btn">
        <span id="signup-spinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
        Create account
      </button>

      <!-- Telegram Login Widget — hidden on localhost -->
      <div id="telegram-section" class="d-none">
        <div class="tg-divider">or sign up with</div>
        <div id="telegram-widget-container" class="d-flex justify-content-center"></div>
      </div>
    </form>

    <div class="text-center mt-3">
      <span class="text-muted small">Already have an account? </span>
      <a href="/login" class="small">Sign in</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    (async () => {
      const { supabaseUrl, supabaseAnonKey, appUrl } = await fetch('/api/config').then(r => r.json());
      const sb = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

      function showError(msg) {
        document.getElementById('signup-error-text').textContent = msg;
        document.getElementById('signup-error').classList.remove('d-none');
      }

      // Already logged in?
      const { data: { session } } = await sb.auth.getSession();
      if (session) { window.location.replace('/'); return; }

      // Telegram Login Widget — only on real domains
      const isLocalhost = ['localhost', '127.0.0.1'].includes(location.hostname);
      if (!isLocalhost) {
        const botUsername  = window._telegramBotName ?? 'predikt_base_bot';
        const tgSection    = document.getElementById('telegram-section');
        const tgContainer  = document.getElementById('telegram-widget-container');
        const script       = document.createElement('script');
        script.src = 'https://telegram.org/js/telegram-widget.js?22';
        script.setAttribute('data-telegram-login',  botUsername);
        script.setAttribute('data-size',            'medium');
        script.setAttribute('data-auth-url',        `${appUrl}/auth/telegram`);
        script.setAttribute('data-request-access',  'write');
        script.async = true;
        tgContainer.appendChild(script);
        tgSection.classList.remove('d-none');
      }

      document.getElementById('signup-form').addEventListener('submit', async e => {
        e.preventDefault();
        const btn     = document.getElementById('signup-btn');
        const spinner = document.getElementById('signup-spinner');
        document.getElementById('signup-error').classList.add('d-none');
        btn.disabled = true;
        spinner.classList.remove('d-none');

        const displayName = document.getElementById('display-name').value.trim();
        const email       = document.getElementById('email').value.trim();
        const password    = document.getElementById('password').value;

        const { data, error } = await sb.auth.signUp({
          email, password,
          options: { data: { display_name: displayName } },
        });

        if (error) {
          showError(error.message);
          btn.disabled = false;
          spinner.classList.add('d-none');
          return;
        }

        if (data.session) {
          await fetch('/auth/provision', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${data.session.access_token}` },
            body: JSON.stringify({ display_name: displayName }),
          });
          window.location.replace('/');
          return;
        }

        document.getElementById('signup-form').classList.add('d-none');
        document.getElementById('signup-success').classList.remove('d-none');
        document.getElementById('confirm-email').textContent = email;
      });
    })();
  </script>
</body>
</html>
