<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predikt — Create Account</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <style>body { overflow: auto; }</style>
</head>
<body class="login-body">

  <div class="login-box" style="animation:fadeSlideIn 0.4s ease;max-width:400px">
    <div class="text-center mb-4">
      <img src="/logo.svg" alt="Predikt" width="52" height="52" class="mb-3">
      <h4 class="fw-600 mb-1" style="letter-spacing:-0.5px">Create account</h4>
      <p class="text-muted small mb-0">Join Predikt — AI-powered prediction market signals</p>
    </div>

    <div id="signup-error" class="alert alert-danger d-none small py-2"></div>
    <div id="signup-success" class="d-none">
      <div class="text-center py-3">
        <div style="font-size:2.5rem;margin-bottom:12px">✉️</div>
        <div class="fw-500 mb-2">Check your email</div>
        <div class="text-muted small">We sent a confirmation link to <strong id="confirm-email"></strong>.<br>Click it to activate your account.</div>
        <a href="/login" class="btn btn-outline-secondary btn-sm mt-3">Back to login</a>
      </div>
    </div>

    <form id="signup-form">
      <div class="mb-3">
        <label class="form-label">Display name</label>
        <input type="text" class="form-control" id="display-name" placeholder="Your name" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary w-100 mb-3" id="signup-btn">
        <span id="signup-spinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
        Create account
      </button>

      <div class="text-center">
        <span class="text-muted small">Or sign up with</span>
      </div>

      <!-- Telegram Login Widget — rendered server-side with bot name -->
      <div id="telegram-widget-container" class="d-flex justify-content-center mt-3"></div>
    </form>

    <div class="text-center mt-3">
      <span class="text-muted small">Already have an account? </span>
      <a href="/login" class="small">Sign in</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    (async () => {
      const { supabaseUrl, supabaseAnonKey, appUrl } = await fetch('/api/config').then(r => r.json());
      const sb = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

      // Already logged in?
      const { data: { session } } = await sb.auth.getSession();
      if (session) { window.location.replace('/'); return; }

      // Inject Telegram Login Widget
      const botName = (new URL(appUrl)).hostname; // fallback — override if needed
      const tgContainer = document.getElementById('telegram-widget-container');
      const script = document.createElement('script');
      script.src = 'https://telegram.org/js/telegram-widget.js?22';
      script.setAttribute('data-telegram-login', window._telegramBotName ?? botName);
      script.setAttribute('data-size', 'medium');
      script.setAttribute('data-auth-url', `${appUrl}/auth/telegram`);
      script.setAttribute('data-request-access', 'write');
      script.async = true;
      tgContainer.appendChild(script);

      document.getElementById('signup-form').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('signup-btn');
        const spinner = document.getElementById('signup-spinner');
        const errEl = document.getElementById('signup-error');
        btn.disabled = true;
        spinner.classList.remove('d-none');
        errEl.classList.add('d-none');

        const displayName = document.getElementById('display-name').value.trim();
        const email       = document.getElementById('email').value.trim();
        const password    = document.getElementById('password').value;

        const { data, error } = await sb.auth.signUp({
          email, password,
          options: { data: { display_name: displayName } },
        });

        if (error) {
          errEl.textContent = error.message;
          errEl.classList.remove('d-none');
          btn.disabled = false;
          spinner.classList.add('d-none');
          return;
        }

        // If email confirmation is disabled in Supabase, session is immediate
        if (data.session) {
          // Provision user profile
          await fetch('/auth/provision', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${data.session.access_token}`,
            },
            body: JSON.stringify({ display_name: displayName }),
          });
          window.location.replace('/');
          return;
        }

        // Show "check your email" state
        document.getElementById('signup-form').classList.add('d-none');
        document.getElementById('signup-success').classList.remove('d-none');
        document.getElementById('confirm-email').textContent = email;
      });
    })();
  </script>
</body>
</html>
